<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:brewer="http://brewer.artifcer.com" layout:decorate="~{layouts/defaultLayout}">

<head>
	<title>Relatório - Pedidos Emitidas</title>
</head>

<section layout:fragment="conteudo">

	<div class="page-header">
		<div class="container-fluid">
			<h1>
				Relatório de pedidos emitidos
			</h1>
		</div>
	</div>

	<div class="container-fluid">
		<form method="POST" th:object="${periodoRelatorio}" th:action="@{/relatorios/pedidosEmitidos}">
			<th:block th:include="fragments/mensagemErroValidacao"></th:block>

			<div class="row">
				<div class="form-group  col-sm-12">
					<label for="dataInicio">Data de criação</label>
					<div class="form-inline">
						<input type="text" class="form-control  aw-form-control-inline-sm  js-date" id="dataInicio"
							th:field="*{dataInicio}" autocomplete="off" placeholder="dd/mm/yyyy"/>
						<label class="aw-form-label-between">a</label>
						<input type="text" class="form-control  aw-form-control-inline-sm  js-date" id="dataFim"
							th:field="*{dataFim}" autocomplete="off" placeholder="dd/mm/yyyy"/>
					</div>
				</div>
			</div>

			<button type="submit" class="btn  btn-primary">Emitir</button>
		</form>
	</div>
</section>


<th:block layout:fragment="javascript-extra">
	<script th:src="@{/styles/vendors/bootstrap-datepicker.standalone.min.css}"></script>
	<script th:src="@{/javascripts/vendors/bootstrap-datepicker.min.js}"></script>
	<script th:src="@{/javascripts/vendors/bootstrap-datepicker.pt-BR.min.js}"></script>
</th:block>


</html>
